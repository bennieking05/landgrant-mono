# ------------------------------------------------------------------------------
# Cloud Build Configuration for LandGrant
# Builds and deploys both backend API and frontend
# ------------------------------------------------------------------------------

# Use concrete Artifact Registry paths (not nested ${_REGION}/${_PROJECT_ID}) so
# `gcloud builds submit --substitutions=COMMIT_SHA=...` and GitHub Actions validate.
substitutions:
  _REGION: us-central1
  _PROJECT_ID: clearpath-490715
  _API_IMAGE: us-central1-docker.pkg.dev/clearpath-490715/landright/api
  _WORKER_IMAGE: us-central1-docker.pkg.dev/clearpath-490715/landright/worker
  _MARKETING_IMAGE: us-central1-docker.pkg.dev/clearpath-490715/landright/marketing
  _FRONTEND_BUCKET: clearpath-490715-frontend

steps:
  # ------------------------------------------------------------------------------
  # Backend API
  # ------------------------------------------------------------------------------
  - id: 'build-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_API_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_API_IMAGE}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  - id: 'push-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_API_IMAGE}'
    waitFor: ['build-api']

  - id: 'deploy-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'landright-api'
      - '--region=${_REGION}'
      - '--image=${_API_IMAGE}:$COMMIT_SHA'
    waitFor: ['push-api']

  # ------------------------------------------------------------------------------
  # Backend Worker
  # ------------------------------------------------------------------------------
  - id: 'build-worker'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_WORKER_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_WORKER_IMAGE}:latest'
      - '-f'
      - 'backend/Dockerfile.worker'
      - '.'

  - id: 'push-worker'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_WORKER_IMAGE}'
    waitFor: ['build-worker']

  - id: 'deploy-worker'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'landright-worker'
      - '--region=${_REGION}'
      - '--image=${_WORKER_IMAGE}:$COMMIT_SHA'
    waitFor: ['push-worker']

  # ------------------------------------------------------------------------------
  # Marketing Site
  # ------------------------------------------------------------------------------
  - id: 'build-marketing'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_MARKETING_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_MARKETING_IMAGE}:latest'
      - '-f'
      - 'marketing/Dockerfile'
      - 'marketing'

  - id: 'push-marketing'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_MARKETING_IMAGE}'
    waitFor: ['build-marketing']

  - id: 'deploy-marketing'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'landright-marketing'
      - '--region=${_REGION}'
      - '--image=${_MARKETING_IMAGE}:$COMMIT_SHA'
    waitFor: ['push-marketing']

  # ------------------------------------------------------------------------------
  # Frontend
  # ------------------------------------------------------------------------------
  - id: 'install-frontend'
    name: 'node:20-slim'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['ci']

  - id: 'build-frontend'
    name: 'node:20-slim'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_API_BASE=https://landright-api-${_PROJECT_ID}.${_REGION}.run.app'
    waitFor: ['install-frontend']

  - id: 'deploy-frontend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-d'
      - 'frontend/dist'
      - 'gs://${_FRONTEND_BUCKET}'
    waitFor: ['build-frontend']

  # Set cache headers for static assets
  - id: 'set-cache-headers'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m setmeta -h "Cache-Control:public, max-age=31536000" \
          "gs://${_FRONTEND_BUCKET}/assets/**"
        gsutil -m setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
          "gs://${_FRONTEND_BUCKET}/index.html"
    waitFor: ['deploy-frontend']

images:
  - '${_API_IMAGE}:$COMMIT_SHA'
  - '${_API_IMAGE}:latest'
  - '${_WORKER_IMAGE}:$COMMIT_SHA'
  - '${_WORKER_IMAGE}:latest'
  - '${_MARKETING_IMAGE}:$COMMIT_SHA'
  - '${_MARKETING_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

timeout: '1800s'  # 30 minutes
