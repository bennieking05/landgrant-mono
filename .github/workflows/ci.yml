name: landright-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Python lint & tests
        run: |
          cd backend
          ruff check app
          black --check app
          pytest
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Frontend lint
        run: |
          cd frontend
          npm run lint
      - name: Terraform fmt & validate
        run: |
          cd infra/gcp
          terraform fmt -check
          terraform validate -no-color
      - name: Upload coverage artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: backend/.pytest_cache
          if-no-files-found: ignore

  playwright:
    name: Playwright Regression
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      
      - name: Run Playwright regression tests
        run: |
          cd frontend
          npm run test:e2e
        env:
          CI: true
      
      - name: Run evidence screenshots
        if: always()
        run: |
          cd frontend
          FEATURE_NAME=ci-${{ github.run_number }} npm run test:evidence || true
        env:
          CI: true
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: artifacts/e2e/report/
          retention-days: 30
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: artifacts/e2e/test-results/
          retention-days: 30
      
      - name: Upload evidence screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence-screenshots
          path: frontend/tests/regression-screenshots/
          retention-days: 30
