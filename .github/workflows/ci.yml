name: landgrant-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: landgrant
          POSTGRES_PASSWORD: landgrant
          POSTGRES_DB: landgrant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landgrant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Python lint
        run: |
          cd backend
          ruff check app
          black --check app

      - name: Backend tests
        run: |
          cd backend
          pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+psycopg://landgrant:landgrant@localhost:5432/landgrant
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          APP_NAME: landgrant-api

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Frontend lint & typecheck
        run: |
          cd frontend
          npm run lint
          npx tsc --noEmit

      - name: Frontend build
        run: |
          cd frontend
          npm run build

      - name: Upload coverage artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: backend/.pytest_cache
          if-no-files-found: ignore

  playwright:
    name: Playwright Regression
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright regression tests
        run: |
          cd frontend
          npm run test:e2e
        env:
          CI: true

      - name: Run evidence screenshots
        if: always()
        run: |
          cd frontend
          FEATURE_NAME=ci-${{ github.run_number }} npm run test:evidence || true
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: artifacts/e2e/report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: artifacts/e2e/test-results/
          retention-days: 30

      - name: Upload evidence screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence-screenshots
          path: frontend/tests/regression-screenshots/
          retention-days: 30

  # ------------------------------------------------------------------------------
  # Deploy to GCP via Cloud Build (push to main only, after tests pass)
  # Requires repository secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOY_SERVICE_ACCOUNT
  # See docs/cicd-gcp.md
  # ------------------------------------------------------------------------------
  deploy:
    name: Deploy (Cloud Build)
    runs-on: ubuntu-latest
    needs: [validate, playwright]
    # Set repository variable GCP_DEPLOY_ENABLED=true after configuring secrets (docs/cicd-gcp.md).
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.GCP_DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: gcp-cloud-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'clearpath-490715' }}

      - name: Submit Cloud Build
        run: |
          set -euo pipefail
          PROJECT="${{ vars.GCP_PROJECT_ID || 'clearpath-490715' }}"
          gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project="${PROJECT}" \
            --substitutions="COMMIT_SHA=${GITHUB_SHA}"
